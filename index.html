<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaas — Fluxos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(180deg, #1a2540 0%, #172034 42%, #101725 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  .title {
    font-size: 13px; font-weight: 300; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,.4);
    margin-bottom: 36px;
  }
  .cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 460px; }
  a.card {
    display: block; text-decoration: none;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px; padding: 20px 22px;
    transition: background .15s, border-color .15s;
  }
  a.card:hover { background: rgba(255,255,255,0.07); border-color: rgba(0,158,219,0.35); }
  .card-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #868491; margin-bottom: 6px; }
  .card-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
  .card-sub { font-size: 11px; color: #868491; margin-top: 5px; font-weight: 500; }
  .card-arrow { float: right; font-size: 18px; color: rgba(255,255,255,.25); margin-top: -2px; transition: color .15s; }
  a.card:hover .card-arrow { color: #009edb; }
</style>
</head>
<body>
  <div class="title">Nexaas &amp; Trinio &mdash; Fluxos</div>
  <div class="cards">
    <a class="card" href="fluxo-bopis/">
      <span class="card-arrow">&rarr;</span>
      <div class="card-label">BOPIS</div>
      <div class="card-title">Fluxo BOPIS</div>
      <div class="card-sub">Buy Online, Pick Up In Store &middot; Sinergia Trinio &times; Nexaas</div>
    </a>
    <a class="card" href="fluxo-pedidos-omni-trinio-nexaas/">
      <span class="card-arrow">&rarr;</span>
      <div class="card-label">Omnichannel</div>
      <div class="card-title">Fluxo de Pedidos Omnichannel</div>
      <div class="card-sub">ERP &middot; Nexaas &middot; Trinio &middot; E-commerce</div>
    </a>
  </div>
</body>
</html>
